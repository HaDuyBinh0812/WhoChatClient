name: Build and Push Client Image

on:
    push:
        branches:
            - main
        paths:
            - "src/**"
            - "public/**"
            - "package.json"
            - "vite.config.ts"
            - "Dockerfile"
            - ".github/workflows/client.yml"

    pull_request:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            # 1. Lấy source code
            - name: Checkout repository
              uses: actions/checkout@v4

            # 2. Login vào GHCR
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 3. Build Docker image
            - name: Build Docker Image
              run: |
                  docker build \
                    -t ghcr.io/${{ github.repository_owner }}/whochat-client:latest \
                    .

            # 4. Push lên GHCR
            - name: Push Docker Image
              run: |
                  docker push ghcr.io/${{ github.repository_owner }}/whochat-client:latest
