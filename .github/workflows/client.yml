name: Build and Push Client Image

on:
    push:
        branches:
            - main
        paths:
            - "client/src/**"
            - "client/public/**"
            - "client/package.json"
            - "client/vite.config.ts"
            - "client/Dockerfile"
            - ".github/workflows/client.yml"

    pull_request:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            # 1. Checkout code
            - name: Checkout repository
              uses: actions/checkout@v4

            # 2. Login GHCR
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 3. Convert username → lowercase
            - name: Set lowercase owner
              run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

            # 4. Build image
            - name: Build Docker Image
              run: |
                  docker build \
                  -t ghcr.io/${{ env.OWNER_LC }}/whochat-client:latest \
                  ./client

            # 5. Push image
            - name: Push Docker Image
              run: |
                  docker push ghcr.io/${{ env.OWNER_LC }}/whochat-client:latest
